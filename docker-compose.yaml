
services:
  web-odoo19-ce:
    image: odoo:19.0
    container_name: odoo19_ce
    depends_on:
      - db
      - ai-engine 
      - redis
    ports:
      - "8019:8069"
    volumes:
      - ./odoo19_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - /tmp/odoo19_sessions:/tmp/odoo_sessions
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    command: odoo -u mrp_ai_expert,textile_rag -d odoo19_ce
    networks:
      - textile-network 

  db:
    image: postgres:16
    container_name: postgres19
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    ports:
      - "5419:5432"
    volumes:
      - ./postgresql_data_19:/var/lib/postgresql/data
    networks:
      - textile-network

  # ====================================================================
  # 🔥 AI ENGINE: FASTAPI TEXTILE RAG (+ Celery integration)
  # ====================================================================
  ai-engine:
    build:
      context: ./fastapi_project
      dockerfile: Dockerfile
    container_name: textile_ai_engine
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi_project:/app
      - ./chroma_db:/app/chroma_db
    environment:
      - CHROMA_DATA_PATH=/app/chroma_db
      - GEMINI_API_KEY=AIzaSyYourRealGeminiKeyHere
      - AI_PROVIDER=ollama
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
      - VECTOR_DB_PROVIDER=qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - qdrant
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - textile-network

  # ====================================================================
  # 🔥 REDIS BROKER (message broker untuk Celery task queue)
  # ====================================================================
  redis:
    image: redis:7-alpine
    container_name: textile_redis
    ports:
      - "6379:6379"
    networks:
      - textile-network

  # ====================================================================
  # 🔥 OLLAMA LLM SERVER (local LLM inference)
  # ====================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - textile-network

  # ====================================================================
  # 🟢 CELERY WORKER — HIGH PRIORITY (Real-time Operator Queries)
  # ====================================================================
  # Worker ini khusus menangani task dari queue 'high_priority':
  # - Query RAG dari operator pabrik (real-time, < 200ms)
  # - Concurrency lebih tinggi (4) agar respons cepat
  # - restart otomatis setiap 100 task untuk cegah memory leak
  # ====================================================================
  celery_worker_high:
    build:
      context: ./fastapi_project
      dockerfile: Dockerfile
    container_name: textile_celery_high
    command: >
      celery -A tasks worker
      --queues=high_priority
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      --prefetch-multiplier=1
      --events
      --time-limit=180
      --soft-time-limit=150
    volumes:
      - ./fastapi_project:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - redis
    networks:
      - textile-network

  # ====================================================================
  # 🔴 CELERY WORKER — LOW PRIORITY (Background SOP Ingest)
  # ====================================================================
  # Worker ini khusus menangani task dari queue 'low_priority':
  # - Ingest dokumen SOP besar (ratusan halaman)
  # - Concurrency rendah (1) agar tidak boros CPU
  # - Restart tiap 10 task karena ingest berat bisa makan memory
  # ====================================================================
  celery_worker_low:
    build:
      context: ./fastapi_project
      dockerfile: Dockerfile
    container_name: textile_celery_low
    command: >
      celery -A tasks worker
      --queues=low_priority
      --loglevel=info
      --concurrency=1
      --max-tasks-per-child=10
      --prefetch-multiplier=1
      --events
      --time-limit=600
      --soft-time-limit=540
    volumes:
      - ./fastapi_project:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - redis
      - qdrant
    networks:
      - textile-network

  # ====================================================================
  # 🔥 QDRANT VECTOR DATABASE — Production-grade Vector Store
  # ====================================================================
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: textile_qdrant
    ports:
      - "6333:6333"   # REST API (untuk Python client)
      - "6334:6334"   # gRPC (optional, lebih cepat)
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - textile-network

  # ====================================================================
  # � FLOWER DASHBOARD — Real-time Celery Monitoring
  # ====================================================================
  # Interface visual untuk memonitor:
  # - Antrean task (high & low priority)
  # - Worker health & utilisasi CPU
  # - Riwayat task sukses/gagal
  # - Manual retry / revoke task
  # ====================================================================
  flower:
    image: mher/flower:2.0
    container_name: textile_flower
    restart: unless-stopped
    command: >
      celery flower
      --broker=redis://redis:6379/0
      --port=5555
      --basic-auth=admin:s3cur3P@ss
      --max-tasks=10000
      --persistent=True
      --db=/data/flower.db
      --natural-time=True
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - flower_data:/data
    networks:
      - textile-network

networks:
  textile-network:
    driver: bridge

volumes:
  odoo19-web-data:
  odoo19-db-data:
  odoo19-chroma-data:
  flower_data:
  qdrant_storage:
