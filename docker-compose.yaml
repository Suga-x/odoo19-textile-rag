version: '3.8'

services:
  web-odoo19-ce:
    image: odoo:19.0
    container_name: odoo19_ce
    depends_on:
      - db
      - ai-engine 
      - redis
    ports:
      - "8019:8069"
    volumes:
      - ./odoo19_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - /tmp/odoo19_sessions:/tmp/odoo_sessions
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    command: odoo -u mrp_ai_expert,textile_rag -d odoo19_ce
    networks:
      - textile-network 

  db:
    image: postgres:16
    container_name: postgres19
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    ports:
      - "5419:5432"
    volumes:
      - ./postgresql_data_19:/var/lib/postgresql/data
    networks:
      - textile-network

  # ====================================================================
  # 🔥 AI ENGINE: FASTAPI TEXTILE RAG (+ Celery integration)
  # ====================================================================
  ai-engine:
    build:
      context: ./fastapi_project
      dockerfile: Dockerfile
    container_name: textile_ai_engine
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi_project:/app
      - ./chroma_db:/app/chroma_db
    environment:
      - CHROMA_DATA_PATH=/app/chroma_db
      - GEMINI_API_KEY=AIzaSyYourRealGeminiKeyHere
      - AI_PROVIDER=ollama
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - textile-network

  # ====================================================================
  # 🔥 REDIS BROKER (message broker untuk Celery task queue)
  # ====================================================================
  redis:
    image: redis:7-alpine
    container_name: textile_redis
    ports:
      - "6379:6379"
    networks:
      - textile-network

  # ====================================================================
  # 🔥 OLLAMA LLM SERVER (local LLM inference)
  # ====================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - textile-network

  # ====================================================================
  # 🔥 CELERY WORKER (background task processor)
  # ====================================================================
  celery_worker:
    build:
      context: ./fastapi_project
      dockerfile: Dockerfile
    container_name: textile_celery_worker
    command: celery -A tasks worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    volumes:
      - ./fastapi_project:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434
    depends_on:
      - redis
    networks:
      - textile-network

networks:
  textile-network:
    driver: bridge

volumes:
  odoo19-web-data:
  odoo19-db-data:
  odoo19-chroma-data:
