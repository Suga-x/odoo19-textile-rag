[options]

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Addons
addons_path = /usr/lib/python3/dist-packages/odoo/addons, /mnt/extra-addons

; Data directory
data_dir = /var/lib/odoo

; Admin password untuk database manager
admin_passwd = admin123

; Network
http_port = 8069
proxy_mode = True

; Logging
logfile = /var/lib/odoo/odoo.log
log_level = info

; Workers
workers = 0
max_cron_threads = 2

; Memory limit
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560

; Time limit
limit_time_cpu = 600
limit_time_real = 1200

; Session
sessions_dir = /tmp/odoo_sessions

; Database filter (opsional)
; dbfilter = ^db_test$